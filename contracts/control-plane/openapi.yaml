openapi: 3.0.3
info:
  title: SuperTeam Control Plane API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      summary: Read Control Plane health
      responses:
        "200":
          description: Control Plane is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/tasks:
    get:
      operationId: listTasks
      summary: List tasks
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/tasks/{taskId}:
    get:
      operationId: getTask
      summary: Get a task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/tasks/{taskId}/status:
    put:
      operationId: updateTaskStatus
      summary: Update task status
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/tasks/{taskId}/cancel:
    post:
      operationId: cancelTask
      summary: Cancel a task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Cancelled task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/runtime/register:
    post:
      operationId: registerRuntimeNode
      summary: Register a Runtime Agent node
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRuntimeNodeRequest"
      responses:
        "201":
          description: Runtime node registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNode"
  /api/v1/runtime/heartbeat:
    post:
      operationId: heartbeatRuntimeNode
      summary: Update Runtime Agent heartbeat
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeHeartbeatRequest"
      responses:
        "200":
          description: Runtime node heartbeat accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNode"
  /api/v1/runtime/tasks/claim:
    post:
      operationId: claimRuntimeTask
      summary: Claim the next executable task for a Runtime Agent
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 60
      responses:
        "200":
          description: Claimed task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "204":
          description: No task is currently available
  /api/v1/runtime/tasks/{taskId}/events:
    post:
      operationId: pushRuntimeTaskEvents
      summary: Push Runtime Agent task events
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushTaskEventsRequest"
      responses:
        "202":
          description: Events accepted
  /api/v1/runtime/tasks/{taskId}/complete:
    post:
      operationId: completeRuntimeTask
      summary: Complete a Runtime Agent task
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/runtime/tasks/{taskId}/fail:
    post:
      operationId: failRuntimeTask
      summary: Report Runtime Agent task failure
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FailTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/runtime/tasks/{taskId}/lease:
    post:
      operationId: renewRuntimeTaskLease
      summary: Acknowledge a Runtime Agent task lease heartbeat
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/TaskId"
      responses:
        "204":
          description: Lease heartbeat acknowledged
  /api/v1/runtime/nodes:
    get:
      operationId: listRuntimeNodes
      summary: List Runtime Agent nodes
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Runtime node list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuntimeNode"
  /api/v1/runtime/nodes/{nodeId}:
    get:
      operationId: getRuntimeNode
      summary: Get a Runtime Agent node
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Runtime node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNode"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/enrollments/hello:
    post:
      operationId: runtimeEnrollmentHello
      summary: Create or refresh a Runtime Agent enrollment hello
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeEnrollmentHelloRequest"
      responses:
        "200":
          description: Enrollment hello accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeEnrollmentHelloResponse"
  /api/v1/runtime/enrollments:
    get:
      operationId: listRuntimeEnrollments
      summary: List Runtime Agent enrollments
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RuntimeEnrollmentStatus"
      responses:
        "200":
          description: Runtime enrollment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuntimeEnrollment"
  /api/v1/runtime/enrollments/{enrollmentId}/approve:
    post:
      operationId: approveRuntimeEnrollment
      summary: Approve a pending Runtime Agent enrollment
      parameters:
        - $ref: "#/components/parameters/EnrollmentId"
      responses:
        "200":
          description: Runtime enrollment approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeEnrollment"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/enrollments/{enrollmentId}/reject:
    post:
      operationId: rejectRuntimeEnrollment
      summary: Reject a pending Runtime Agent enrollment
      parameters:
        - $ref: "#/components/parameters/EnrollmentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeEnrollmentDecisionRequest"
      responses:
        "200":
          description: Runtime enrollment rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeEnrollment"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/enrollments/{enrollmentId}/revoke:
    post:
      operationId: revokeRuntimeEnrollment
      summary: Revoke an approved Runtime Agent enrollment
      parameters:
        - $ref: "#/components/parameters/EnrollmentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeEnrollmentDecisionRequest"
      responses:
        "200":
          description: Runtime enrollment revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeEnrollment"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/sessions/{sessionId}/renew:
    post:
      operationId: renewRuntimeSession
      summary: Renew a short-lived Runtime Agent session
      parameters:
        - $ref: "#/components/parameters/RuntimeSessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewRuntimeSessionRequest"
      responses:
        "200":
          description: Runtime session renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSession"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/sessions/{sessionId}/revoke:
    post:
      operationId: revokeRuntimeSession
      summary: Revoke a short-lived Runtime Agent session
      parameters:
        - $ref: "#/components/parameters/RuntimeSessionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeRuntimeSessionRequest"
      responses:
        "200":
          description: Runtime session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSession"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/nodes/{nodeId}/capabilities:
    get:
      operationId: listRuntimeCapabilitiesForNode
      summary: List capabilities reported by a Runtime Agent node
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Runtime capability list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuntimeCapability"
        "404":
          $ref: "#/components/responses/Error"
    put:
      operationId: upsertRuntimeCapabilities
      summary: Upsert capabilities reported by a Runtime Agent node
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeCapabilityReportRequest"
      responses:
        "200":
          description: Runtime capabilities accepted
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuntimeCapability"
  /api/v1/digital-employees:
    get:
      operationId: listDigitalEmployees
      summary: List digital employees
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DigitalEmployeeStatus"
      responses:
        "200":
          description: Digital employee list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DigitalEmployee"
    post:
      operationId: createDigitalEmployee
      summary: Create a digital employee draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDigitalEmployeeRequest"
      responses:
        "201":
          description: Digital employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalEmployee"
  /api/v1/digital-employees/{employeeId}:
    get:
      operationId: getDigitalEmployee
      summary: Get a digital employee
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "200":
          description: Digital employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalEmployee"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/digital-employees/{employeeId}/status:
    put:
      operationId: updateDigitalEmployeeStatus
      summary: Update a digital employee status
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDigitalEmployeeStatusRequest"
      responses:
        "200":
          description: Digital employee status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalEmployee"
  /api/v1/digital-employees/{employeeId}/execution-instance:
    get:
      operationId: getDigitalEmployeeExecutionInstance
      summary: Get the digital employee execution instance
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "200":
          description: Digital employee execution instance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalEmployeeExecutionInstance"
        "404":
          $ref: "#/components/responses/Error"
    put:
      operationId: upsertDigitalEmployeeExecutionInstance
      summary: Create or update the unique digital employee execution instance
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertDigitalEmployeeExecutionInstanceRequest"
      responses:
        "200":
          description: Digital employee execution instance saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalEmployeeExecutionInstance"
  /api/v1/digital-employees/{employeeId}/provider-sessions:
    get:
      operationId: listProviderSessionsForDigitalEmployee
      summary: List provider sessions for a digital employee
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Provider session list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderSession"
    post:
      operationId: createProviderSessionForDigitalEmployee
      summary: Create a provider session mapping for a digital employee
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderSessionRequest"
      responses:
        "201":
          description: Provider session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSession"
  /api/v1/provider-sessions/{providerSessionId}/events:
    get:
      operationId: listProviderSessionEvents
      summary: List provider session events
      parameters:
        - $ref: "#/components/parameters/ProviderSessionId"
      responses:
        "200":
          description: Provider session event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderSessionEvent"
    post:
      operationId: appendProviderSessionEvent
      summary: Append a provider session event reported by Runtime Agent
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/ProviderSessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppendProviderSessionEventRequest"
      responses:
        "202":
          description: Provider session event accepted
components:
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnrollmentId:
      name: enrollmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RuntimeSessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EmployeeId:
      name: employeeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderSessionId:
      name: providerSessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    RuntimeNodeIdHeader:
      name: X-Node-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 1
  responses:
    Error:
      description: Request failed
      content:
        text/plain:
          schema:
            type: string
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          enum:
            - control-plane
    Task:
      type: object
      required:
        - id
        - tenant_id
        - title
        - provider_type
        - status
        - priority
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        creator_id:
          type: string
          format: uuid
        provider_type:
          type: string
        target_node_id:
          type: string
        assigned_node_id:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        workspace_path:
          type: string
        params:
          type: object
          additionalProperties: true
        priority:
          type: integer
          format: int32
        cancelled_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TaskStatus:
      type: string
      enum:
        - pending
        - claimed
        - running
        - completed
        - failed
        - cancelled
    CreateTaskRequest:
      type: object
      required:
        - title
        - provider_type
        - params
      properties:
        title:
          type: string
        description:
          type: string
        provider_type:
          type: string
        target_node_id:
          type: string
        workspace_path:
          type: string
        params:
          type: object
          additionalProperties: true
        priority:
          type: integer
          format: int32
    UpdateTaskStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/TaskStatus"
    RuntimeNode:
      type: object
      required:
        - node_id
        - name
        - supported_providers
        - max_slots
        - current_load
        - status
      properties:
        node_id:
          type: string
        name:
          type: string
        supported_providers:
          type: array
          items:
            type: string
        max_slots:
          type: integer
          format: int32
        current_load:
          type: integer
          format: int32
        status:
          type: string
          enum:
            - online
            - offline
        metadata:
          type: object
          additionalProperties: true
        last_heartbeat_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RegisterRuntimeNodeRequest:
      type: object
      required:
        - node_id
        - name
        - supported_providers
        - max_slots
      properties:
        node_id:
          type: string
        name:
          type: string
        supported_providers:
          type: array
          items:
            type: string
        max_slots:
          type: integer
          format: int32
        metadata:
          type: object
          additionalProperties: true
    RuntimeHeartbeatRequest:
      type: object
      required:
        - current_load
      properties:
        current_load:
          type: integer
          format: int32
        status:
          type: string
    RuntimeEnrollmentStatus:
      type: string
      enum:
        - pending
        - approved
        - rejected
        - revoked
    RuntimeEnrollment:
      type: object
      required:
        - id
        - tenant_id
        - runtime_node_id
        - node_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        runtime_node_id:
          type: string
          format: uuid
        node_id:
          type: string
          minLength: 1
        bootstrap_key_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/RuntimeEnrollmentStatus"
        request_payload:
          type: object
          additionalProperties: true
        approved_by:
          type: string
          format: uuid
        approved_at:
          type: string
          format: date-time
        rejected_by:
          type: string
          format: uuid
        rejected_at:
          type: string
          format: date-time
        reject_reason:
          type: string
        revoked_by:
          type: string
          format: uuid
        revoked_at:
          type: string
          format: date-time
        revoke_reason:
          type: string
        last_hello_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RuntimeEnrollmentHelloRequest:
      type: object
      required:
        - node_id
        - bootstrap_key
        - name
      properties:
        node_id:
          type: string
        bootstrap_key:
          type: string
        name:
          type: string
        version:
          type: string
        supported_providers:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeCapabilityInput"
        metadata:
          type: object
          additionalProperties: true
    RuntimeEnrollmentHelloResponse:
      type: object
      required:
        - enrollment
      properties:
        enrollment:
          $ref: "#/components/schemas/RuntimeEnrollment"
        session:
          $ref: "#/components/schemas/RuntimeSession"
        session_token:
          type: string
          description: Short-lived token returned only after enrollment is approved.
    RuntimeEnrollmentDecisionRequest:
      type: object
      properties:
        reason:
          type: string
    RuntimeSession:
      type: object
      required:
        - id
        - tenant_id
        - runtime_node_id
        - expires_at
        - last_seen_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        runtime_node_id:
          type: string
          format: uuid
        enrollment_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
        revoked_reason:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RenewRuntimeSessionRequest:
      type: object
      required:
        - expires_at
      properties:
        expires_at:
          type: string
          format: date-time
    RevokeRuntimeSessionRequest:
      type: object
      properties:
        reason:
          type: string
    RuntimeCapabilityInput:
      type: object
      required:
        - capability_type
        - capability_key
        - provider_type
        - available
        - status
        - health_status
      properties:
        capability_type:
          type: string
        capability_key:
          type: string
        provider_type:
          type: string
        provider_version:
          type: string
        binary_path:
          type: string
        available:
          type: boolean
        workspace_base_dir:
          type: string
        capacity:
          type: object
          additionalProperties: true
        labels:
          type: object
          additionalProperties: true
        status:
          type: string
        details:
          type: object
          additionalProperties: true
        health_status:
          type: string
        metadata:
          type: object
          additionalProperties: true
    RuntimeCapability:
      allOf:
        - $ref: "#/components/schemas/RuntimeCapabilityInput"
