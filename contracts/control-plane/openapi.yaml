openapi: 3.0.3
info:
  title: SuperTeam Control Plane API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      summary: Read Control Plane health
      responses:
        "200":
          description: Control Plane is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/tasks:
    get:
      operationId: listTasks
      summary: List tasks
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/tasks/{taskId}:
    get:
      operationId: getTask
      summary: Get a task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/tasks/{taskId}/status:
    put:
      operationId: updateTaskStatus
      summary: Update task status
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/tasks/{taskId}/cancel:
    post:
      operationId: cancelTask
      summary: Cancel a task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Cancelled task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/runtime/register:
    post:
      operationId: registerRuntimeNode
      summary: Register a Runtime Agent node
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRuntimeNodeRequest"
      responses:
        "201":
          description: Runtime node registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNode"
  /api/v1/runtime/heartbeat:
    post:
      operationId: heartbeatRuntimeNode
      summary: Update Runtime Agent heartbeat
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeHeartbeatRequest"
      responses:
        "200":
          description: Runtime node heartbeat accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNode"
  /api/v1/runtime/tasks/claim:
    post:
      operationId: claimRuntimeTask
      summary: Claim the next executable task for a Runtime Agent
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 60
      responses:
        "200":
          description: Claimed task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "204":
          description: No task is currently available
  /api/v1/runtime/tasks/{taskId}/events:
    post:
      operationId: pushRuntimeTaskEvents
      summary: Push Runtime Agent task events
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushTaskEventsRequest"
      responses:
        "202":
          description: Events accepted
  /api/v1/runtime/tasks/{taskId}/complete:
    post:
      operationId: completeRuntimeTask
      summary: Complete a Runtime Agent task
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/runtime/tasks/{taskId}/fail:
    post:
      operationId: failRuntimeTask
      summary: Report Runtime Agent task failure
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FailTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/runtime/tasks/{taskId}/lease:
    post:
      operationId: renewRuntimeTaskLease
      summary: Acknowledge a Runtime Agent task lease heartbeat
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/TaskId"
      responses:
        "204":
          description: Lease heartbeat acknowledged
  /api/v1/runtime/nodes:
    get:
      operationId: listRuntimeNodes
      summary: List Runtime Agent nodes
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Runtime node list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuntimeNode"
  /api/v1/runtime/nodes/{nodeId}:
    get:
      operationId: getRuntimeNode
      summary: Get a Runtime Agent node
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Runtime node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNode"
        "404":
          $ref: "#/components/responses/Error"
components:
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    RuntimeNodeIdHeader:
      name: X-Node-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 1
  responses:
    Error:
      description: Request failed
      content:
        text/plain:
          schema:
            type: string
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          enum:
            - control-plane
    Task:
      type: object
      required:
        - id
        - title
        - provider_type
        - status
        - priority
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        creator_id:
          type: integer
          format: int64
        provider_type:
          type: string
        target_node_id:
          type: string
        assigned_node_id:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        workspace_path:
          type: string
        params:
          type: object
          additionalProperties: true
        priority:
          type: integer
          format: int32
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TaskStatus:
      type: string
      enum:
        - pending
        - claimed
        - running
        - completed
        - failed
        - cancelled
    CreateTaskRequest:
      type: object
      required:
        - title
        - provider_type
        - params
      properties:
        title:
          type: string
        description:
          type: string
        provider_type:
          type: string
        target_node_id:
          type: string
        workspace_path:
          type: string
        params:
          type: object
          additionalProperties: true
        priority:
          type: integer
          format: int32
    UpdateTaskStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/TaskStatus"
    RuntimeNode:
      type: object
      required:
        - node_id
        - name
        - supported_providers
        - max_slots
        - current_load
        - status
      properties:
        node_id:
          type: string
        name:
          type: string
        supported_providers:
          type: array
          items:
            type: string
        max_slots:
          type: integer
          format: int32
        current_load:
          type: integer
          format: int32
        status:
          type: string
          enum:
            - online
            - offline
        metadata:
          type: object
          additionalProperties: true
        last_heartbeat_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RegisterRuntimeNodeRequest:
      type: object
      required:
        - node_id
        - name
        - supported_providers
        - max_slots
      properties:
        node_id:
          type: string
        name:
          type: string
        supported_providers:
          type: array
          items:
            type: string
        max_slots:
          type: integer
          format: int32
        metadata:
          type: object
          additionalProperties: true
    RuntimeHeartbeatRequest:
      type: object
      required:
        - current_load
      properties:
        current_load:
          type: integer
          format: int32
        status:
          type: string
    PushTaskEventsRequest:
      type: object
      required:
        - events
      properties:
        events:
          type: array
          items:
            type: object
            additionalProperties: true
    CompleteTaskRequest:
      type: object
      properties:
        result:
          type: object
          additionalProperties: true
    FailTaskRequest:
      type: object
      required:
        - error
      properties:
        error:
          type: string
