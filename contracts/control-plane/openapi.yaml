openapi: 3.0.3
info:
  title: SuperTeam Control Plane API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      summary: Read Control Plane health
      responses:
        "200":
          description: Control Plane is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          enum:
            - control-plane
