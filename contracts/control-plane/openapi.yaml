      in: query
      required: false
      schema:
        type: integer
        minimum: 0
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CommandId:
      name: commandId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    EnrollmentId:
      name: enrollmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RuntimeSessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EmployeeId:
      name: employeeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TeamId:
      name: teamId
      in: path
      required: true
      schema:
        type: string
        format: uuid
