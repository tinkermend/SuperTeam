openapi: 3.0.3
info:
  title: SuperTeam Control Plane API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      summary: Read Control Plane health
      responses:
        "200":
          description: Control Plane is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/tasks:
    get:
      operationId: listTasks
      summary: List tasks
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/tasks/{taskId}:
    get:
      operationId: getTask
      summary: Get a task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/tasks/{taskId}/status:
    put:
      operationId: updateTaskStatus
      summary: Update task status
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/tasks/{taskId}/cancel:
    post:
      operationId: cancelTask
      summary: Cancel a task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Cancelled task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/runtime/register:
    post:
      operationId: registerRuntimeNode
      summary: Register a Runtime Agent node
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRuntimeNodeRequest"
      responses:
        "201":
          description: Runtime node registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNode"
  /api/v1/runtime/heartbeat:
    post:
      operationId: heartbeatRuntimeNode
      summary: Update Runtime Agent heartbeat
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeHeartbeatRequest"
      responses:
        "200":
          description: Runtime node heartbeat accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNode"
  /api/v1/runtime/tasks/claim:
    post:
      operationId: claimRuntimeTask
      summary: Claim the next executable task for a Runtime Agent
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 60
      responses:
        "200":
          description: Claimed task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "204":
          description: No task is currently available
  /api/v1/runtime/tasks/{taskId}/events:
    post:
      operationId: pushRuntimeTaskEvents
      summary: Push Runtime Agent task events
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushTaskEventsRequest"
      responses:
        "202":
          description: Events accepted
  /api/v1/runtime/tasks/{taskId}/complete:
    post:
      operationId: completeRuntimeTask
      summary: Complete a Runtime Agent task
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/runtime/tasks/{taskId}/fail:
    post:
      operationId: failRuntimeTask
      summary: Report Runtime Agent task failure
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FailTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /api/v1/runtime/tasks/{taskId}/lease:
    post:
      operationId: renewRuntimeTaskLease
      summary: Acknowledge a Runtime Agent task lease heartbeat
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/TaskId"
      responses:
        "204":
          description: Lease heartbeat acknowledged
  /api/v1/runtime/commands/{commandId}/events:
    post:
      operationId: recordRuntimeCommandEvent
      summary: Record a Runtime command event reported by Runtime Agent
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/CommandId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeCommandEventWritebackRequest"
      responses:
        "202":
          description: Runtime command event accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeCommandWritebackAccepted"
  /api/v1/runtime/commands/{commandId}/complete:
    post:
      operationId: completeRuntimeCommand
      summary: Complete a Runtime command reported by Runtime Agent
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/CommandId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeCommandTerminalWritebackRequest"
      responses:
        "202":
          description: Runtime command completion accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeCommandWritebackAccepted"
  /api/v1/runtime/commands/{commandId}/fail:
    post:
      operationId: failRuntimeCommand
      summary: Fail a Runtime command reported by Runtime Agent
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/CommandId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeCommandTerminalWritebackRequest"
      responses:
        "202":
          description: Runtime command failure accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeCommandWritebackAccepted"
  /api/v1/runtime/commands/{commandId}/cancelled:
    post:
      operationId: cancelRuntimeCommand
      summary: Cancel a Runtime command reported by Runtime Agent
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/CommandId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeCommandTerminalWritebackRequest"
      responses:
        "202":
          description: Runtime command cancellation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeCommandWritebackAccepted"
  /api/v1/runtime/commands/{commandId}/timed-out:
    post:
      operationId: timeOutRuntimeCommand
      summary: Time out a Runtime command reported by Runtime Agent
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/CommandId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeCommandTerminalWritebackRequest"
      responses:
        "202":
          description: Runtime command timeout accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeCommandWritebackAccepted"
  /api/v1/runtime/nodes:
    get:
      operationId: listRuntimeNodes
      summary: List Runtime Agent nodes
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Runtime node list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuntimeNode"
  /api/v1/runtime/nodes/{nodeId}:
    get:
      operationId: getRuntimeNode
      summary: Get a Runtime Agent node
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Runtime node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNode"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/overview:
    get:
      operationId: getRuntimeOverview
      summary: Get Runtime Agent fleet overview
      responses:
        "200":
          description: Runtime overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeOverview"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/events:
    get:
      operationId: listRuntimeEvents
      summary: List Runtime Agent events
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: event_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RuntimeEventType"
        - name: severity
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RuntimeEventSeverity"
        - name: node_id
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: provider_type
          in: query
          required: false
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Runtime event list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeEventList"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/enrollments/hello:
    post:
      operationId: runtimeEnrollmentHello
      summary: Create or refresh a Runtime Agent enrollment hello
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeEnrollmentHelloRequest"
      responses:
        "200":
          description: Enrollment hello accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeEnrollmentHelloResponse"
  /api/v1/runtime/enrollments:
    get:
      operationId: listRuntimeEnrollments
      summary: List Runtime Agent enrollments
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RuntimeEnrollmentStatus"
      responses:
        "200":
          description: Runtime enrollment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuntimeEnrollment"
  /api/v1/runtime/enrollments/{enrollmentId}/approve:
    post:
      operationId: approveRuntimeEnrollment
      summary: Approve a pending Runtime Agent enrollment
      parameters:
        - $ref: "#/components/parameters/EnrollmentId"
      responses:
        "200":
          description: Runtime enrollment approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeEnrollment"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/enrollments/{enrollmentId}/reject:
    post:
      operationId: rejectRuntimeEnrollment
      summary: Reject a pending Runtime Agent enrollment
      parameters:
        - $ref: "#/components/parameters/EnrollmentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeEnrollmentDecisionRequest"
      responses:
        "200":
          description: Runtime enrollment rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeEnrollment"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/enrollments/{enrollmentId}/revoke:
    post:
      operationId: revokeRuntimeEnrollment
      summary: Revoke an approved Runtime Agent enrollment
      parameters:
        - $ref: "#/components/parameters/EnrollmentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeEnrollmentDecisionRequest"
      responses:
        "200":
          description: Runtime enrollment revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeEnrollment"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/sessions/{sessionId}/renew:
    post:
      operationId: renewRuntimeSession
      summary: Renew a short-lived Runtime Agent session
      parameters:
        - $ref: "#/components/parameters/RuntimeSessionId"
      responses:
        "200":
          description: Runtime session renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSession"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/sessions/{sessionId}/revoke:
    post:
      operationId: revokeRuntimeSession
      summary: Revoke a short-lived Runtime Agent session
      parameters:
        - $ref: "#/components/parameters/RuntimeSessionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeRuntimeSessionRequest"
      responses:
        "200":
          description: Runtime session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSession"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runtime/nodes/{nodeId}/capabilities:
    get:
      operationId: listRuntimeCapabilitiesForNode
      summary: List capabilities reported by a Runtime Agent node
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Runtime capability list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuntimeCapability"
        "404":
          $ref: "#/components/responses/Error"
    put:
      operationId: upsertRuntimeCapabilities
      summary: Upsert capabilities reported by a Runtime Agent node
      parameters:
        - $ref: "#/components/parameters/RuntimeNodeIdHeader"
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeCapabilityReportRequest"
      responses:
        "200":
          description: Runtime capabilities accepted
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuntimeCapability"
  /api/v1/projects:
    get:
      operationId: listProjects
      summary: List projects
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProjectStatus"
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
    post:
      operationId: createProject
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectResponse"
        "400":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{projectId}:
    get:
      operationId: getProject
      summary: Get a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateProject
      summary: Update project configuration facts
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectConfigRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{projectId}/archive:
    post:
      operationId: archiveProject
      summary: Archive a project
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{projectId}/overview:
    get:
      operationId: getProjectOverview
      summary: Get project overview
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectOverview"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{projectId}/members:
    get:
      operationId: listProjectMembers
      summary: List project members
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    put:
      operationId: replaceProjectMembers
      summary: Replace project members
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceProjectMembersRequest"
      responses:
        "200":
          description: Project members replaced
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{projectId}/tasks:
    get:
      operationId: listProjectTasks
      summary: List project tasks
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Project task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectTask"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{projectId}/events:
    get:
      operationId: listProjectEvents
      summary: List project events
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Project event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectEvent"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{projectId}/config:
    get:
      operationId: getProjectConfig
      summary: Get current project configuration facts
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Current project configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectConfig"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    put:
      operationId: updateProjectConfig
      summary: Update project configuration facts
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectConfigRequest"
      responses:
        "200":
          description: Project configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{projectId}/demands:
    get:
      operationId: listProjectDemands
      summary: List project demands
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Project demand list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectDemand"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    post:
      operationId: submitProjectDemand
      summary: Submit a project demand
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitProjectDemandRequest"
      responses:
        "201":
          description: Project demand recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDemand"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/teams:
    get:
      operationId: listTeams
      summary: List tenant teams
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - active
              - disabled
              - archived
        - name: governance_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GovernanceSummaryStatus"
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Team list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamListItem"
    post:
      operationId: createTeam
      summary: Create a tenant team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamOverview"
  /api/v1/teams/{teamId}:
    get:
      operationId: getTeam
      summary: Get a tenant team
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateTeam
      summary: Update a tenant team
      parameters:
        - $ref: "#/components/parameters/TeamId"
      requestBody:
        required: true
        content:
          application/json:
