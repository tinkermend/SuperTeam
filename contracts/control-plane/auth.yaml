openapi: 3.0.3
info:
  title: SuperTeam Control Plane - Auth API
  version: 1.0.0
  description: 用户认证相关 API

servers:
  - url: http://localhost:8080
    description: 本地开发环境

paths:
  /api/auth/login:
    post:
      summary: 用户登录
      operationId: login
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: admin
                password:
                  type: string
                  format: password
                  minLength: 1
                  example: admin
      responses:
        '200':
          description: 登录成功
          headers:
            Set-Cookie:
              schema:
                type: string
                example: session_token=abc123; HttpOnly; Secure; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/auth/me:
    get:
      summary: 获取当前登录用户信息
      operationId: getCurrentUser
      tags:
        - Auth
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      summary: 用户登出
      operationId: logout
      tags:
        - Auth
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 登出成功
          headers:
            Set-Cookie:
              schema:
                type: string
                example: session_token=; Max-Age=0
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: logout success

  /api/auth/login-logs:
    get:
      summary: 查询 Web 控制台登录日志
      operationId: listLoginLogs
      tags:
        - Auth
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginLogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_token

  schemas:
    LoginResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'

    CurrentUserResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'

    LoginLogListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LoginLogRecord'

    LoginLogRecord:
      type: object
      required: [id, event_type, username, result, created_at]
      properties:
        id:
          type: integer
          format: int64
        event_type:
          type: string
          enum: [login_succeeded, login_failed, logout_succeeded]
        user_id:
          type: integer
          format: int64
          nullable: true
        username:
          type: string
        session_id:
          type: string
          nullable: true
        client_ip:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        result:
          type: string
          enum: [succeeded, failed]
        failure_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    UserSummary:
      type: object
      required: [id, username, status]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        status:
          type: string
          enum: [active, disabled]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string

  responses:
    Unauthorized:
      description: 未登录或凭据无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 账号已被禁用
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
