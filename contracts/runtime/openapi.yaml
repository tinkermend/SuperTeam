openapi: 3.1.0
info:
  title: SuperTeam Runtime Control API
  version: 0.1.0
paths:
  /runtime/nodes/{nodeId}/heartbeat:
    post:
      operationId: heartbeatRuntimeNode
      summary: Report Runtime Agent node liveness and capacity
      parameters:
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeHeartbeatRequest"
      responses:
        "204":
          description: Heartbeat accepted
  /runtime/tasks/claim:
    post:
      operationId: claimRuntimeTask
      summary: Claim the next executable task for a Runtime Agent node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeClaimRequest"
      responses:
        "200":
          description: Task lease granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeTaskLease"
        "204":
          description: No task is currently available
  /runtime/tasks/{taskId}/lease:
    patch:
      operationId: renewRuntimeTaskLease
      summary: Renew an active Runtime Agent task lease
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeLeaseRenewalRequest"
      responses:
        "204":
          description: Lease renewed
components:
  parameters:
    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  schemas:
    RuntimeHeartbeatRequest:
      type: object
      required:
        - status
        - slots
      properties:
        status:
          type: string
          enum:
            - idle
            - busy
        slots:
          type: object
          required:
            - total
            - available
          properties:
            total:
              type: integer
              minimum: 0
            available:
              type: integer
              minimum: 0
    RuntimeClaimRequest:
      type: object
      required:
        - nodeId
      properties:
        nodeId:
          type: string
          minLength: 1
        providerKinds:
          type: array
          items:
            type: string
    RuntimeTaskLease:
      type: object
      required:
        - taskId
        - leaseId
        - leaseExpiresAt
      properties:
        taskId:
          type: string
        leaseId:
          type: string
        leaseExpiresAt:
          type: string
          format: date-time
        workspaceRef:
          type: string
    RuntimeLeaseRenewalRequest:
      type: object
      required:
        - nodeId
        - leaseId
      properties:
        nodeId:
          type: string
          minLength: 1
        leaseId:
          type: string
          minLength: 1
