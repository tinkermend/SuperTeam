version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: superteam-postgres-dev
    environment:
      POSTGRES_USER: superteam
      POSTGRES_PASSWORD: superteam
      POSTGRES_DB: superteam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superteam"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: superteam-redis-dev
    command: redis-server --requirepass superteam
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: superteam-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO 初始化 - 创建 bucket
  minio-init:
    image: minio/mc:latest
    container_name: superteam-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/superteam-artifacts --ignore-existing;
      mc anonymous set download myminio/superteam-artifacts;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
